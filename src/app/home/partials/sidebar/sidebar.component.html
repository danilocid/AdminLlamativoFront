<aside class="main-sidebar sidebar-dark-primary elevation-4">
  <!-- Brand Logo -->
  <a href="/home" class="brand-link">
    <span class="brand-text font-weight-light">
      <b>SIVIG</b>
    </span>
  </a>
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- SidebarSearch Form -->

    <!-- Sidebar Menu -->
    <nav class="mt-2">
      <ul
        class="nav nav-pills nav-sidebar flex-column"
        data-widget="treeview"
        role="menu"
        data-accordion="false"
      >
        <!-- Add icons to the links using the .nav-icon class
               with font-awesome or any other icon font library -->
        <li class="nav-item">
          <a
            [routerLink]="['ventas']"
            [routerLinkActive]="['active']"
            [class.active]="isActive('ventas')"
            class="nav-link"
          >
            <i class="nav-icon fas fa-file-invoice-dollar"></i>
            <p>Ventas</p>
          </a>
        </li>
        <li class="nav-item">
          <a
            [routerLink]="['articulos']"
            [routerLinkActive]="['active']"
            class="nav-link"
          >
            <i class="fas fa-warehouse nav-icon"></i>
            <p>Articulos</p>
          </a>
        </li>
        <li class="nav-item" [class.menu-open]="isActive('inventario')">
          <a class="nav-link" [class.active]="isActive('inventario')">
            <i class="nav-icon fas fa-warehouse"></i>
            <p>
              Inventario
              <i class="right fas fa-angle-left"></i>
            </p>
          </a>
          <ul class="nav nav-treeview">
            <li class="nav-item">
              <a
                [routerLink]="['inventario/recepciones']"
                [routerLinkActive]="['active']"
                class="nav-link"
              >
                <i class="far fa-circle nav-icon"></i>
                <p>Recepciones</p>
              </a>
            </li>
            <li class="nav-item">
              <a
                [routerLink]="['inventario/ajustes']"
                [routerLinkActive]="['active']"
                class="nav-link"
              >
                <i class="far fa-circle nav-icon"></i>
                <p>Ajustes de Inventario</p>
              </a>
            </li>
          </ul>
        </li>

        <li class="nav-item">
          <a
            [routerLink]="['entidades']"
            [routerLinkActive]="['active']"
            class="nav-link"
          >
            <i class="nav-icon fas fa-user"></i>
            <p>Entidades</p>
          </a>
        </li>
        <li class="nav-item">
          <a
            [routerLink]="['compras']"
            [routerLinkActive]="['compras']"
            [class.active]="isActive('compras')"
            class="nav-link"
          >
            <i class="nav-icon fas fa-file-invoice-dollar"></i>
            <p>Compras</p>
          </a>
        </li>

        <li class="nav-item">
          <a
            [routerLink]="['reportes']"
            [routerLinkActive]="['active']"
            [class.active]="isActive('reportes')"
            class="nav-link"
          >
            <i class="fas fa-receipt nav-icon"></i>
            <p>Reportes</p>
          </a>
        </li>
        <li class="nav-item">
          <a
            [routerLink]="['hydrocontrol']"
            [routerLinkActive]="['active']"
            [class.active]="isActive('hydrocontrol')"
            class="nav-link"
          >
            <i class="fas fa-chart-line nav-icon"></i>
            <p>HydroControl</p>
          </a>
        </li>
      </ul>
    </nav>

  </div>
  <!-- /.sidebar -->
</aside>
