<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="m-0">Ventas</h1>
      </div>
      <!-- /.col -->

      <!-- /.col -->
    </div>
    <!-- /.row -->
  </div>
  <!-- /.container-fluid -->
</div>
<section class="content">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title">Listado de ventas</h4>
      </div>

      <div class="card-body">
        <a [routerLink]="['create']" class="btn btn-primary mb-3"
          >Agregar Venta</a
        >
        <app-simple-table
          [data]="ventas"
          [columns]="columns"
          [serverSide]="true"
          [totalRecords]="totalRecords"
          [loading]="loading"
          [showSearch]="false"
          [showViewButton]="true"
          [showEditButton]="false"
          [showDeleteButton]="false"
          (dataRequest)="onDataRequest($event)"
          (onView)="onView($event)"
        ></app-simple-table>
      </div>
    </div>
  </div>
</section>
