<div class="simple-table-wrapper">
  <!-- Controles superiores -->
  <div class="row mb-3">
    <div class="col-sm-12 col-md-6">
      <div class="dataTables_length" *ngIf="showPageSize">
        <label>
          Mostrar
          <select
            class="custom-select custom-select-sm form-control form-control-sm"
            [(ngModel)]="pageSize"
            (change)="onPageSizeChange()"
          >
            <option [value]="10">10</option>
            <option [value]="25">25</option>
            <option [value]="50">50</option>
            <option [value]="100">100</option>
          </select>
          registros
        </label>
      </div>
    </div>
    <div class="col-sm-12 col-md-6">
      <div class="dataTables_filter" *ngIf="showSearch">
        <label>
          Buscar:
          <input
            type="search"
            class="form-control form-control-sm"
            placeholder=""
            [(ngModel)]="searchTerm"
            (input)="onSearch()"
          />
        </label>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive position-relative">
    <!-- Loading overlay -->
    <div class="loading-overlay" *ngIf="loading">
      <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Cargando...</span>
      </div>
    </div>
    <table
      class="table table-bordered table-hover dataTable dtr-inline"
      [class.table-loading]="loading"
    >
      <thead>
        <tr>
          <th
            *ngFor="let col of columns"
            class="sorting"
            [class.sorting_asc]="
              sortColumn === col.key && sortDirection === 'asc'
            "
            [class.sorting_desc]="
              sortColumn === col.key && sortDirection === 'desc'
            "
            [class.sorting]="sortColumn !== col.key && col.sortable !== false"
            (click)="col.sortable !== false && onSort(col.key)"
          >
            {{ col.label }}
          </th>
          <th *ngIf="showActions" class="no-sort">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let row of paginatedData; let i = index; trackBy: trackByFn"
          [class.odd]="i % 2 === 0"
          [class.even]="i % 2 === 1"
        >
          <td *ngFor="let col of columns">
            {{ formatCell(row, col) }}
          </td>
          <td *ngIf="showActions" class="text-center">
            <a
              *ngIf="showViewButton && rowLink"
              [href]="rowLink(row)"
              class="btn btn-sm btn-info mr-1"
              title="Ver"
            >
              <i class="fas fa-eye"></i>
            </a>
            <button
              *ngIf="showViewButton && !rowLink"
              class="btn btn-sm btn-info mr-1"
              (click)="onView.emit(row)"
              title="Ver"
            >
              <i class="fas fa-eye"></i>
            </button>
            <button
              *ngIf="showEditButton"
              class="btn btn-sm btn-warning mr-1"
              (click)="onEdit.emit(row)"
              title="Editar"
            >
              <i class="fas fa-edit"></i>
            </button>
            <button
              *ngIf="showDeleteButton"
              class="btn btn-sm btn-danger"
              (click)="onDelete.emit(row)"
              title="Eliminar"
            >
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="paginatedData.length === 0">
          <td
            [attr.colspan]="columns.length + (showActions ? 1 : 0)"
            class="text-center dataTables_empty"
          >
            {{ emptyMessage }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Controles inferiores -->
  <div class="row" *ngIf="showPagination">
    <div class="col-sm-12 col-md-5">
      <div class="dataTables_info">
        Mostrando {{ totalCount === 0 ? 0 : startIndex + 1 }} a
        {{ endIndex }} de {{ totalCount }} registros
        <span *ngIf="searchTerm && !serverSide">
          (filtrado de {{ data.length }} registros totales)
        </span>
      </div>
    </div>
    <div class="col-sm-12 col-md-7">
      <div
        class="dataTables_paginate paging_simple_numbers"
        *ngIf="lastPage > 0"
      >
        <ul class="pagination">
          <li
            class="paginate_button page-item first"
            [class.disabled]="currentPage === 1"
          >
            <a class="page-link" (click)="currentPage !== 1 && goToPage(1)">
              Primero
            </a>
          </li>
          <li
            class="paginate_button page-item previous"
            [class.disabled]="currentPage === 1"
          >
            <a
              class="page-link"
              (click)="currentPage !== 1 && goToPage(currentPage - 1)"
            >
              Anterior
            </a>
          </li>
          <li
            *ngFor="let page of visiblePages"
            class="paginate_button page-item"
            [class.active]="page === currentPage"
          >
            <a class="page-link" (click)="goToPage(page)">
              {{ page }}
            </a>
          </li>
          <li
            class="paginate_button page-item next"
            [class.disabled]="currentPage === lastPage"
          >
            <a
              class="page-link"
              (click)="currentPage !== lastPage && goToPage(currentPage + 1)"
            >
              Siguiente
            </a>
          </li>
          <li
            class="paginate_button page-item last"
            [class.disabled]="currentPage === lastPage"
          >
            <a
              class="page-link"
              (click)="currentPage !== lastPage && goToPage(lastPage)"
            >
              Último
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
