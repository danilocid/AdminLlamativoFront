<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="m-0">Ajustes de inventario</h1>
      </div>
    </div>
  </div>
</div>
<section class="content">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title">Listado de ajustes</h4>
      </div>

      <div class="card-body">
        <div class="row mb-3">
          <div class="col">
            <a [routerLink]="['inventory']" class="btn btn-primary"
              >Agregar ajuste</a
            >
          </div>
        </div>

        <app-simple-table
          [data]="inventories"
          [columns]="columns"
          [serverSide]="true"
          [totalRecords]="totalRecords"
          [loading]="loading"
          [showSearch]="false"
          [showViewButton]="true"
          [showEditButton]="false"
          [showDeleteButton]="false"
          (dataRequest)="onDataRequest($event)"
          (onView)="onView($event)"
        ></app-simple-table>
      </div>
    </div>
  </div>
</section>
